{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="glass-card p-8 rounded-2xl">
        <h1 class="text-2xl font-bold text-white mb-6">Upload New Resource</h1>
        
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm text-gray-400 mb-2">Title</label>
                <input type="text" name="title" required class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">Description</label>
                <textarea name="description" rows="4" required class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Category</label>
                    <select name="category" class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500">
                        <option value="">Select Category</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Difficulty</label>
                    <select name="difficulty" class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Resource Type</label>
                    <select name="resource_type" class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500">
                        <option value="video">Video</option>
                        <option value="article">Article</option>
                        <option value="pdf">PDF</option>
                        <option value="link">Link</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">External URL (optional)</label>
                    <input type="url" name="url" placeholder="https://" class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500">
                </div>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">File Upload (optional)</label>
                <input type="file" name="file" class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500 file:bg-gray-700 file:text-white file:border-0 file:rounded file:px-4 file:py-2 file:mr-4">
            </div>
            
            <div>
                <label class="block text-sm text-gray-400 mb-2">Thumbnail (optional)</label>
                <input type="file" name="thumbnail" accept="image/*" class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500 file:bg-gray-700 file:text-white file:border-0 file:rounded file:px-4 file:py-2 file:mr-4">
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold transition-colors shadow-lg shadow-indigo-500/20">
                    Upload Resource
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
