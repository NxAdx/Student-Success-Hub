{% extends 'base.html' %}
{% load static %}

{% block title %}Server Error - Student Success Hub{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-red-600 mb-4">500</h1>
        <h2 class="text-3xl font-semibold text-gray-800 mb-6">Internal Server Error</h2>
        <p class="text-gray-600 mb-8 max-w-md mx-auto">
            Something went wrong on our end. We've been notified and are working to fix it. Please try again later.
        </p>
        <a href="{% url 'landing' %}" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">
            Go back home
        </a>
    </div>
</div>
{% endblock %}
