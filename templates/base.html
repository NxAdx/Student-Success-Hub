{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Success Hub{% endblock %}</title>
    {% tailwind_css %}
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-nav { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Dark mode form overrides */
        input[type="text"], 
        input[type="email"], 
        input[type="password"], 
        input[type="number"], 
        input[type="date"], 
        input[type="time"], 
        input[type="datetime-local"], 
        input[type="url"], 
        input[type="file"],
        select, 
        textarea {
            background-color: rgba(31, 41, 55, 0.5) !important; /* bg-gray-800/50 */
            border-color: rgba(75, 85, 99, 0.5) !important; /* border-gray-600/50 */
            color: #ffffff !important;
            border-radius: 0.5rem; /* rounded-lg */
            font-size: 1rem !important; /* 16px to prevent iOS zoom */
        }

        
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: #6366f1 !important; /* indigo-500 */
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
            background-color: rgba(31, 41, 55, 0.8) !important;
        }

        /* Fix file input text color */
        input[type="file"]::file-selector-button {
            background-color: #374151;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            margin-right: 1rem;
            border-radius: 0.375rem;
        }
        
        option {
            background-color: #1f2937;
            color: #ffffff;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">

    {% include 'navbar.html' %}

    <main class="flex-grow container mx-auto px-4 py-6 md:py-8">

        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="p-4 rounded-lg flex items-center justify-between {% if message.tags == 'success' %}bg-green-500/20 text-green-300 border border-green-500/30{% elif message.tags == 'error' %}bg-red-500/20 text-red-300 border border-red-500/30{% else %}bg-blue-500/20 text-blue-300 border border-blue-500/30{% endif %}">
                        {{ message }}
                        <button onclick="this.parentElement.remove()" class="text-sm opacity-70 hover:opacity-100">&times;</button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <!-- Alpine.js for interactivity -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>


    <script>
        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                e.preventDefault();
                const searchInput = document.querySelector('input[name="q"]');
                if (searchInput) searchInput.focus();
            }
        });
    </script>
</body>
</html>
