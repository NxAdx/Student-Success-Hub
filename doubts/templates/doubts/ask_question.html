{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="glass-card p-8 rounded-2xl">
        <h1 class="text-2xl font-bold text-white mb-6">Ask a Question</h1>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm text-gray-400 mb-2">Title</label>
                <input type="text" name="title" required class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500" placeholder="e.g., How do I configure Django with PostgreSQL?">
                <p class="text-xs text-gray-500 mt-1">Be specific and imagine you're asking a question to another person.</p>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">Details</label>
                <textarea name="content" rows="8" required class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500" placeholder="Include all the information someone would need to answer your question..."></textarea>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">Tags (comma separated)</label>
                <input type="text" name="tags" class="w-full bg-gray-800 border-gray-700 rounded-lg text-white p-3 focus:ring-indigo-500" placeholder="e.g., python, django, database">
            </div>

            <button type="submit" class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold transition-colors shadow-lg shadow-indigo-500/20">
                Post Question
            </button>
        </form>
    </div>
</div>
{% endblock %}
