services:
  - type: web
    name: student-success-hub
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn student_success_hub.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DATABASE_URL
        fromDatabase:
          name: student-success-hub-db
          property: connectionString

databases:
  - name: student-success-hub-db
    databaseName: student_success_hub
    user: student_success_hub_user
