{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-8 px-4">
    <h1 class="text-3xl font-bold text-white mb-6">Create Support Group</h1>
    
    <div class="bg-gray-800/50 backdrop-blur-xl border border-gray-700/50 rounded-2xl p-6">
        <form method="post">
            {% csrf_token %}
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Group Name</label>
                    <input type="text" name="name" required placeholder="e.g., Stress Relief Zone"
                        class="w-full px-4 py-3 rounded-xl border border-gray-600 bg-gray-700/50 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Description</label>
                    <textarea name="description" rows="3" placeholder="What is this group about?"
                        class="w-full px-4 py-3 rounded-xl border border-gray-600 bg-gray-700/50 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all"></textarea>
                </div>
                <div class="bg-pink-900/20 border border-pink-500/30 rounded-xl p-4">
                    <div class="flex items-center gap-3">
                        <svg class="w-5 h-5 text-pink-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        <p class="text-sm text-pink-300">All messages in support groups are <strong>anonymous</strong>. Members' identities are hidden to create a safe space.</p>
                    </div>
                </div>
                <button type="submit" class="w-full py-3 px-6 rounded-xl bg-pink-600 hover:bg-pink-700 text-white font-semibold transition-all shadow-lg shadow-pink-600/30">
                    Create Support Group
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
