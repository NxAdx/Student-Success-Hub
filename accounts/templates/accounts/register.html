{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign Up - Student Success Hub{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12">
    <div class="glass-card p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold text-center text-white mb-2">Create Account</h2>
        <p class="text-center text-gray-400 mb-8 text-sm">Join the community of learners and leaders</p>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form|crispy }}
            
            <button type="submit" class="w-full py-3 px-4 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold transition-all shadow-lg shadow-indigo-500/30 mt-6">
                Create Account
            </button>
        </form>

        <p class="text-center text-gray-400 mt-6 text-sm">
            Already have an account? <a href="{% url 'login' %}" class="text-indigo-400 hover:text-indigo-300 font-medium">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
