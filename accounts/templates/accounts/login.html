{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign In - Student Success Hub{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12">
    <div class="glass-card p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold text-center text-white mb-8">Welcome Back</h2>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            {{ form|crispy }}
            
            <button type="submit" class="w-full py-3 px-4 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold transition-all shadow-lg shadow-indigo-500/30">
                Sign In
            </button>
        </form>

        <p class="text-center text-gray-400 mt-6 text-sm">
            Don't have an account? <a href="{% url 'register' %}" class="text-indigo-400 hover:text-indigo-300 font-medium">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
